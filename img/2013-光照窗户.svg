  <ellipse cx="500" cy="120" rx="40" ry="15" fill="white" opacity="0.12"/>
  <g transform="translate(660, 40)"><rect width="90" height="32" rx="16" fill="white" opacity="0.85"/><text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#6c757d">2013</text></g>
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">一束光照进黑暗的窗户</text>
