<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="emotionBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcb69f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a9e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#emotionBg)"/>
  
  <!-- 道路 -->
  <path d="M 350 400 Q 370 300 400 250 Q 430 200 500 150" stroke="white" stroke-width="80" fill="none" opacity="0.3"/>
  
  <!-- 树木 -->
  <g opacity="0.6">
    <g transform="translate(150, 200)">
      <rect x="-6" y="0" width="12" height="60" fill="#8b7355"/>
      <circle cx="0" cy="-10" r="40" fill="#4a7c59"/>
      <circle cx="-25" cy="10" r="35" fill="#5a8c69"/>
      <circle cx="25" cy="10" r="35" fill="#5a8c69"/>
    </g>
    <g transform="translate(650, 220)">
      <rect x="-5" y="0" width="10" height="50" fill="#8b7355"/>
      <circle cx="0" cy="-8" r="35" fill="#4a7c59"/>
      <circle cx="-20" cy="8" r="30" fill="#5a8c69"/>
      <circle cx="20" cy="8" r="30" fill="#5a8c69"/>
    </g>
  </g>
  
  <!-- 花朵点缀 -->
  <g fill="white" opacity="0.5">
    <circle cx="100" cy="300" r="5"/>
    <circle cx="250" cy="320" r="4"/>
    <circle cx="550" cy="310" r="5"/>
    <circle cx="700" cy="290" r="4"/>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#fcb69f">2013</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">青春岁月</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>