  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- 飘落的爱心 -->
  <g opacity="0.3">
    <path d="M 100 50 A 12 12 0 0 0 76 50 C 76 62 100 74 100 74 C 100 74 124 62 124 50 A 12 12 0 0 0 100 50 Z" fill="white"/>
