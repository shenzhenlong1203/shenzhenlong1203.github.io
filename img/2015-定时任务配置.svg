<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" />
    </linearGradient>
    <pattern id="codeGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#codeBg)"/>
  <rect width="800" height="400" fill="url(#codeGrid)"/>
  
  <!-- 代码符号装饰 -->
  <g opacity="0.15" font-family="monospace" font-size="36" fill="white">
    <text x="50" y="80">&lt;/&gt;</text>
    <text x="650" y="100">LB RB</text>
    <text x="100" y="350">LB RB</text>
    <text x="580" y="330">; ;</text>
    <text x="300" y="60">LP RP</text>
  </g>
  
  <!-- 代码编辑器窗口 -->
  <g transform="translate(150, 80)">
    <rect width="500" height="220" rx="10" fill="white" opacity="0.9"/>
    <!-- 标题栏 -->
    <rect width="500" height="30" rx="10" fill="#f0f0f0"/>
    <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="15" r="6" fill="#27c93f"/>
    
    <!-- 代码内容 -->
    <g font-family="monospace" font-size="12" fill="#333">
      <text x="20" y="60" fill="#c678dd">function</text>
      <text x="85" y="60" fill="#61afef">init</text>
      <text x="115" y="60">() LBRACE</text>
      <text x="40" y="85" fill="#e5c07b">const</text>
      <text x="80" y="85" fill="#98c379">data</text>
      <text x="125" y="85">= await fetch();</text>
      <text x="40" y="110" fill="#c678dd">return</text>
      <text x="95" y="110" fill="#98c379">data</text>
      <text x="140" y="110">.process();</text>
      <text x="20" y="135">RBRACE</text>
    </g>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a11cb">2015</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">定时任务配置</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>