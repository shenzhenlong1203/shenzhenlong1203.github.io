<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#archBg)"/>
  
  <!-- 架构层次 -->
  <g transform="translate(100, 50)">
    <!-- 第一层 -->
    <rect width="600" height="60" rx="10" fill="white" opacity="0.85"/>
    <text x="300" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Client Layer</text>
    
    <!-- 箭头 -->
    <polygon points="300,120 290,110 310,110" fill="white" opacity="0.6"/>
    
    <!-- 第二层 -->
    <rect y="120" width="600" height="60" rx="10" fill="white" opacity="0.75"/>
    <text x="300" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Service Layer</text>
    
    <!-- 箭头 -->
    <polygon points="300,190 290,180 310,180" fill="white" opacity="0.6"/>
    
    <!-- 第三层 -->
    <rect y="190" width="600" height="60" rx="10" fill="white" opacity="0.65"/>
    <text x="300" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Data Layer</text>
  </g>
  
  <!-- 装饰线条 -->
  <g stroke="white" stroke-width="1" opacity="0.2">
    <line x1="50" y1="320" x2="750" y2="320"/>
    <line x1="50" y1="335" x2="750" y2="335"/>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">2016</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">日志收集架构选型</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>