<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sunsetSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#feb47b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空 -->
  <rect width="800" height="400" fill="url(#sunsetSky)"/>
  
  <!-- 夕阳 -->
  <circle cx="400" cy="200" r="80" fill="#ff4500" opacity="0.8"/>
  <circle cx="400" cy="200" r="100" fill="#ff4500" opacity="0.3"/>
  <circle cx="400" cy="200" r="130" fill="#ff4500" opacity="0.15"/>
  
  <!-- 云彩 -->
  <g opacity="0.4">
    <ellipse cx="200" cy="150" rx="80" ry="20" fill="#ff6347"/>
    <ellipse cx="600" cy="170" rx="70" ry="18" fill="#ff6347"/>
    <ellipse cx="350" cy="120" rx="60" ry="15" fill="#ff7f50"/>
  </g>
  
  <!-- 地面剪影 -->
  <polygon points="0,280 100,250 200,270 300,240 400,260 500,230 600,250 700,220 800,240 800,280" fill="#2d1810" opacity="0.7"/>
  
  <!-- 树木剪影 -->
  <g fill="#2d1810" opacity="0.8">
    <g transform="translate(100, 250)">
      <rect x="-5" y="0" width="10" height="40"/>
      <circle cx="0" cy="-15" r="25"/>
      <circle cx="-18" cy="5" r="20"/>
      <circle cx="18" cy="5" r="20"/>
    </g>
    <g transform="translate(700, 260)">
      <rect x="-4" y="0" width="8" height="35"/>
      <circle cx="0" cy="-12" r="22"/>
      <circle cx="-15" cy="5" r="18"/>
      <circle cx="15" cy="5" r="18"/>
    </g>
  </g>
  
  <!-- 地面 -->
  <rect x="0" y="310" width="800" height="90" fill="#1a0f0a" opacity="0.9"/>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff6b6b">2014</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">黄昏时分的校园天际线</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>