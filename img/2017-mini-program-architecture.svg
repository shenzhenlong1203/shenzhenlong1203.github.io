<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#11998e;stop-opacity:1"/><stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1"/></linearGradient></defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.5"/>
  <!-- 架构层 -->
  <g transform="translate(100, 40)">
    <rect width="600" height="60" rx="10" fill="white" opacity="0.85"/>
    <text x="300" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Application Layer</text>
    <polygon points="300,110 290,100 310,100" fill="white" opacity="0.5"/>
    <rect y="110" width="600" height="60" rx="10" fill="white" opacity="0.75"/>
    <text x="300" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Service Layer</text>
    <polygon points="300,180 290,170 310,170" fill="white" opacity="0.5"/>
    <rect y="180" width="600" height="60" rx="10" fill="white" opacity="0.65"/>
    <text x="300" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Data Layer</text>
    <polygon points="300,250 290,240 310,240" fill="white" opacity="0.5"/>
    <rect y="250" width="600" height="60" rx="10" fill="white" opacity="0.55"/>
    <text x="300" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">Infrastructure</text>
  </g>
  <defs><pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/></pattern></defs>
  <g transform="translate(660, 40)"><rect width="90" height="32" rx="16" fill="white" opacity="0.85"/><text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">2017</text></g>
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">小程序架构示意</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>