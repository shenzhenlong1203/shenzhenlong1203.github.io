<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 夜空 -->
  <rect width="800" height="400" fill="url(#nightSky)"/>
  
  <!-- 星星 -->
  <g fill="white">
    <circle cx="50" cy="30" r="1.5" opacity="0.8"/>
    <circle cx="120" cy="80" r="1" opacity="0.6"/>
    <circle cx="200" cy="45" r="1.5" opacity="0.7"/>
    <circle cx="280" cy="90" r="1" opacity="0.9"/>
    <circle cx="350" cy="50" r="1.5" opacity="0.6"/>
    <circle cx="480" cy="70" r="1" opacity="0.8"/>
    <circle cx="550" cy="40" r="1.5" opacity="0.7"/>
    <circle cx="650" cy="85" r="1" opacity="0.9"/>
    <circle cx="720" cy="50" r="1.5" opacity="0.6"/>
    <circle cx="100" cy="150" r="1" opacity="0.7"/>
    <circle cx="300" cy="140" r="1.5" opacity="0.8"/>
    <circle cx="500" cy="130" r="1" opacity="0.6"/>
    <circle cx="700" cy="145" r="1.5" opacity="0.7"/>
  </g>
  
  <!-- 月亮 -->
  <circle cx="600" cy="100" r="60" fill="#f5f5f5" opacity="0.9"/>
  <circle cx="580" cy="85" r="50" fill="url(#nightSky)" opacity="0.7"/>
  
  <!-- 月亮光晕 -->
  <circle cx="600" cy="100" r="80" fill="#f5f5f5" opacity="0.15"/>
  <circle cx="600" cy="100" r="100" fill="#f5f5f5" opacity="0.08"/>
  
  <!-- 远山轮廓 -->
  <polygon points="0,320 100,260 200,290 300,250 400,280 500,240 600,270 700,230 800,260 800,320" fill="#1a1a2e" opacity="0.6"/>
  
  <!-- 地面 -->
  <rect x="0" y="310" width="800" height="90" fill="#0d1117" opacity="0.8"/>
  
  <!-- 水面倒影 -->
  <rect x="0" y="320" width="800" height="80" fill="#1a237e" opacity="0.3"/>
  <ellipse cx="600" cy="350" rx="40" ry="8" fill="#f5f5f5" opacity="0.2"/>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">2015</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">夜晚的车站</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>