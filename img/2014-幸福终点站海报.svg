<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006994;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001f3f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空 -->
  <rect width="800" height="220" fill="url(#sky)"/>
  
  <!-- 太阳/月亮 -->
  <circle cx="400" cy="100" r="50" fill="#ffd700" opacity="0.9"/>
  <circle cx="400" cy="100" r="70" fill="#ffd700" opacity="0.3"/>
  
  <!-- 海面 -->
  <rect x="0" y="220" width="800" height="180" fill="url(#sea)"/>
  
  <!-- 波浪 -->
  <path d="M 0 230 Q 100 220 200 230 T 400 230 T 600 230 T 800 230" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 0 250 Q 100 240 200 250 T 400 250 T 600 250 T 800 250" stroke="white" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 0 270 Q 100 260 200 270 T 400 270 T 600 270 T 800 270" stroke="white" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M 0 290 Q 100 280 200 290 T 400 290 T 600 290 T 800 290" stroke="white" stroke-width="2" fill="none" opacity="0.15"/>
  
  <!-- 海鸥 -->
  <g opacity="0.6">
    <path d="M 150 80 Q 160 70 170 80 Q 180 70 190 80" stroke="white" stroke-width="2" fill="none"/>
    <path d="M 620 120 Q 630 110 640 120 Q 650 110 660 120" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#667eea">2014</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">电影海报</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>