<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="flowBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#flowBg)"/>
  
  <!-- 流程图元素 -->
  <g transform="translate(200, 50)">
    <!-- 开始 -->
    <rect width="200" height="50" rx="25" fill="white" opacity="0.9"/>
    <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#fa709a">Start</text>
    
    <!-- 箭头 -->
    <polygon points="100,60 90,50 110,50" fill="white" opacity="0.7"/>
    
    <!-- 处理1 -->
    <rect y="70" width="200" height="50" rx="8" fill="white" opacity="0.85"/>
    <text x="100" y="100" text-anchor="middle" font-size="13" fill="#333">Process A</text>
    
    <!-- 箭头 -->
    <polygon points="100,130 90,120 110,120" fill="white" opacity="0.7"/>
    
    <!-- 判断 -->
    <polygon points="100,140 200,180 100,220 0,180" fill="white" opacity="0.8"/>
    <text x="100" y="185" text-anchor="middle" font-size="12" fill="#333">Condition?</text>
    
    <!-- 箭头 -->
    <polygon points="100,230 90,220 110,220" fill="white" opacity="0.7"/>
    
    <!-- 处理2 -->
    <rect y="240" width="200" height="50" rx="8" fill="white" opacity="0.85"/>
    <text x="100" y="270" text-anchor="middle" font-size="13" fill="#333">Process B</text>
    
    <!-- 箭头 -->
    <polygon points="100,300 90,290 110,290" fill="white" opacity="0.7"/>
    
    <!-- 结束 -->
    <rect y="300" width="200" height="50" rx="25" fill="white" opacity="0.9"/>
    <text x="100" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#fa709a">End</text>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#fa709a">2014</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">Servlet请求处理流程</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>