<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空 -->
  <rect width="800" height="400" fill="url(#sky)"/>
  
  <!-- 云朵 -->
  <g opacity="0.6">
    <ellipse cx="150" cy="80" rx="60" ry="25" fill="white"/>
    <ellipse cx="180" cy="70" rx="40" ry="20" fill="white"/>
    <ellipse cx="120" cy="75" rx="35" ry="18" fill="white"/>
    
    <ellipse cx="600" cy="100" rx="50" ry="22" fill="white"/>
    <ellipse cx="630" cy="92" rx="35" ry="18" fill="white"/>
  </g>
  
  <!-- 远山（带雪顶） -->
  <polygon points="0,280 100,150 200,220 300,120 400,200 500,140 600,180 700,130 800,170 800,280" fill="#4a7c59" opacity="0.8"/>
  
  <!-- 雪峰 -->
  <polygon points="280,140 300,120 320,145" fill="#f0f0f0" opacity="0.9"/>
  <polygon points="480,155 500,140 520,160" fill="#f0f0f0" opacity="0.9"/>
  <polygon points="680,145 700,130 720,150" fill="#f0f0f0" opacity="0.9"/>
  
  <!-- 近山 -->
  <polygon points="0,320 50,260 150,290 250,240 350,280 450,250 550,270 650,230 750,260 800,240 800,320" fill="#4a7c59" opacity="0.6"/>
  
  <!-- 地面 -->
  <rect x="0" y="310" width="800" height="90" fill="#2d5016" opacity="0.8"/>
  
  <!-- 树木 -->
  <g opacity="0.7">
    <g transform="translate(80, 280)">
      <rect x="-3" y="0" width="6" height="30" fill="#4a3520"/>
      <polygon points="0,-20 -15,10 15,10" fill="#1a5c2a"/>
      <polygon points="0,-10 -12,5 12,5" fill="#2d7a3e"/>
    </g>
    <g transform="translate(200, 285)">
      <rect x="-3" y="0" width="6" height="25" fill="#4a3520"/>
      <polygon points="0,-15 -12,8 12,8" fill="#1a5c2a"/>
      <polygon points="0,-8 -10,3 10,3" fill="#2d7a3e"/>
    </g>
    <g transform="translate(650, 275)">
      <rect x="-4" y="0" width="8" height="35" fill="#4a3520"/>
      <polygon points="0,-25 -18,12 18,12" fill="#1a5c2a"/>
      <polygon points="0,-12 -14,5 14,5" fill="#2d7a3e"/>
    </g>
  </g>
  
  <!-- 年份徽章 -->
  <g transform="translate(660, 40)">
    <rect width="90" height="32" rx="16" fill="white" opacity="0.85"/>
    <text x="45" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a90e2">2013</text>
  </g>
  
  <!-- 描述文字 -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="white" opacity="0.95">聚光灯下的私人空间</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="white" opacity="0.6">Dragon_SZ Blog</text>
</svg>